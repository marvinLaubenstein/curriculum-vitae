name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main  

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_NAME: ${{secrets.VITE_NAME}}
      VITE_STREET: ${{ secrets.VITE_STREET }}
      VITE_ZIP: ${{ secrets.VITE_ZIP }}
      VITE_CITY: ${{ secrets.VITE_CITY }}
      VITE_EMAIL: ${{ secrets.VITE_EMAIL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build React/Vite App
        run: npm run build

      - name: Add CNAME for Custom Domain
        run: echo "marvin-laubenstein.dev" > ./dist/CNAME

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4